name: Bootstrap Azure Container App Infra

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region (for example usgovvirginia or eastus2)
        required: true
        default: usgovvirginia
        type: string
      resource_group:
        description: Resource group name
        required: true
        default: rg-ato-copilot
        type: string
      acr_name:
        description: ACR name (must be globally unique)
        required: true
        default: atocopilotacr
        type: string
      containerapp_env_name:
        description: Container Apps environment name
        required: true
        default: cae-ato-copilot
        type: string
      containerapp_name:
        description: Container app name
        required: true
        default: ca-ato-copilot-mcp
        type: string
        sql_server_name:
          description: Azure SQL Server name (must be globally unique, e.g. sql-ato-copilot)
          required: true
          default: sql-ato-copilot
          type: string
        sql_database_name:
          description: Database name
          required: true
          default: AtoCopilot
          type: string
        sql_admin_login:
          description: SQL admin username
          required: true
          default: atoadmin
          type: string

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Create Azure Container Registry
        run: |
          az acr create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "${{ github.event.inputs.acr_name }}" \
            --sku Basic \
            --admin-enabled true

      - name: Create Log Analytics Workspace (idempotent)
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          LOCATION="${{ github.event.inputs.location }}"
          LAW_NAME="law-${{ github.event.inputs.containerapp_env_name }}"

          EXISTING=$(az monitor log-analytics workspace show \
            --resource-group "$RG" --workspace-name "$LAW_NAME" \
            --query "customerId" -o tsv 2>/dev/null || true)

          if [[ -n "$EXISTING" ]]; then
            echo "Log Analytics Workspace '$LAW_NAME' already exists. Reusing."
          else
            az monitor log-analytics workspace create \
              --resource-group "$RG" \
              --workspace-name "$LAW_NAME" \
              --location "$LOCATION" \
              --retention-time 30
          fi

      - name: Create Container Apps environment
        run: |
          ENV_NAME="${{ github.event.inputs.containerapp_env_name }}"
          RG="${{ github.event.inputs.resource_group }}"
          LOCATION="${{ github.event.inputs.location }}"
          LAW_NAME="law-${{ github.event.inputs.containerapp_env_name }}"

          LAW_ID=$(az monitor log-analytics workspace show \
            --resource-group "$RG" --workspace-name "$LAW_NAME" \
            --query "customerId" -o tsv)
          LAW_KEY=$(az monitor log-analytics workspace get-shared-keys \
            --resource-group "$RG" --workspace-name "$LAW_NAME" \
            --query "primarySharedKey" -o tsv)

          EXISTING=$(az containerapp env show --name "$ENV_NAME" --resource-group "$RG" --query "id" -o tsv 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            WORKLOAD=$(az containerapp env show --name "$ENV_NAME" --resource-group "$RG" --query "properties.workloadProfiles" -o tsv 2>/dev/null || true)
            if [[ -n "$WORKLOAD" ]]; then
              echo "::warning::Existing environment '$ENV_NAME' uses workload profiles. Deleting and recreating as Consumption-only..."
              az containerapp env delete --name "$ENV_NAME" --resource-group "$RG" --yes
            else
              echo "Environment '$ENV_NAME' already exists as Consumption-only. Skipping creation."
              exit 0
            fi
          fi

          az containerapp env create \
            --name "$ENV_NAME" \
            --resource-group "$RG" \
            --location "$LOCATION" \
            --logs-workspace-id "$LAW_ID" \
            --logs-workspace-key "$LAW_KEY" \
            --enable-workload-profiles false

      - name: Create initial container app
        run: |
          CA_NAME="${{ github.event.inputs.containerapp_name }}"
          ENV_NAME="${{ github.event.inputs.containerapp_env_name }}"
           RG="${{ github.event.inputs.resource_group }}"

          LOGIN_SERVER=$(az acr show -g "$RG" -n "${{ github.event.inputs.acr_name }}" --query loginServer -o tsv)
          USERNAME=$(az acr credential show -n "${{ github.event.inputs.acr_name }}" --query username -o tsv)
          PASSWORD=$(az acr credential show -n "${{ github.event.inputs.acr_name }}" --query "passwords[0].value" -o tsv)

          EXISTING=$(az containerapp show --name "$CA_NAME" --resource-group "$RG" --query "id" -o tsv 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "Container app '$CA_NAME' already exists. Skipping creation."
            exit 0
          fi

          az containerapp create \
            --name "$CA_NAME" \
            --resource-group "$RG" \
            --environment "$ENV_NAME" \
            --image mcr.microsoft.com/k8se/quickstart:latest \
            --target-port 8080 \
            --ingress external \
            --registry-server "${LOGIN_SERVER}" \
            --registry-username "${USERNAME}" \
            --registry-password "${PASSWORD}"

      - name: Output values for repository variables
        shell: bash
        run: |
          echo "Set these repository variables after bootstrap:" >> "$GITHUB_STEP_SUMMARY"
           echo "" >> "$GITHUB_STEP_SUMMARY"
           echo "## Secrets" >> "$GITHUB_STEP_SUMMARY"
           echo "- ATO_DB_CONNECTION_STRING  (shown in 'Create Azure SQL Server' step output)" >> "$GITHUB_STEP_SUMMARY"
           echo "" >> "$GITHUB_STEP_SUMMARY"
           echo "## Repository Variables" >> "$GITHUB_STEP_SUMMARY"
          echo "- AZURE_RESOURCE_GROUP=${{ github.event.inputs.resource_group }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- AZURE_ACR_NAME=${{ github.event.inputs.acr_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- AZURE_CONTAINERAPP_ENV_NAME=${{ github.event.inputs.containerapp_env_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- AZURE_CONTAINERAPP_NAME=${{ github.event.inputs.containerapp_name }}" >> "$GITHUB_STEP_SUMMARY"
