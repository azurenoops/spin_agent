name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-build-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ato.Copilot.sln

      - name: Build
        run: dotnet build Ato.Copilot.sln -c Release --no-restore -nologo

      - name: Run unit tests
        run: dotnet test tests/Ato.Copilot.Tests.Unit/Ato.Copilot.Tests.Unit.csproj -c Release --no-build -nologo --logger trx

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            tests/**/TestResults/*.trx
          if-no-files-found: ignore

  vscode-extension-compile:
    name: VS Code Extension Compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

  # ---------------------------------------------------------------------------
  # Bicep lint — validates IaC modules on every PR touching infra/**
  # Epic #123 (T010)
  # ---------------------------------------------------------------------------
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(toJson(github.event.pull_request.changed_files), 'infra/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint infra/main.bicep
        run: az bicep lint --file infra/main.bicep

  # ---------------------------------------------------------------------------
  # M365 Teams Extension — build + mocha tests on every PR touching extensions/m365/**
  # Epic #129 (T061-01)
  # ---------------------------------------------------------------------------
  m365-test:
    name: M365 Teams Extension
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(toJson(github.event.pull_request.changed_files), 'extensions/m365/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extensions/m365/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/m365

      - name: Build (TypeScript compile)
        run: npm run build
        working-directory: extensions/m365

      - name: Run tests
        run: npm test
        working-directory: extensions/m365

  ato-compliance-gate:
    name: ATO Compliance Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ATO compliance gate
        uses: ./.github/actions/ato-compliance-gate
        with:
          scan-paths: src,scripts,docs
          severity-threshold: '2'
          # Set this repository variable if you host MCP externally.
          # Defaults to localhost and still produces annotations if unreachable.
          mcp-server-url: ${{ vars.ATO_MCP_SERVER_URL || 'http://localhost:5000' }}
          fail-on-error: 'true'
