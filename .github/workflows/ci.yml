name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-build-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ato.Copilot.sln

      - name: Build
        run: dotnet build Ato.Copilot.sln -c Release --no-restore -nologo

      - name: Run unit tests
        run: dotnet test tests/Ato.Copilot.Tests.Unit/Ato.Copilot.Tests.Unit.csproj -c Release --no-build -nologo --logger trx

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            tests/**/TestResults/*.trx
          if-no-files-found: ignore

  vscode-extension-compile:
    name: VS Code Extension Compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

  # ---------------------------------------------------------------------------
  # Terraform lint — fmt check + validate on every PR touching infra/**
  # Epic #123 (Task #156)
  # ---------------------------------------------------------------------------
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(toJson(github.event.pull_request.changed_files), 'infra/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: terraform fmt --check
        run: terraform fmt --check -recursive
        working-directory: infra/terraform

      - name: terraform init (no backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: terraform validate
        run: terraform validate
        working-directory: infra/terraform

  # ---------------------------------------------------------------------------
  # M365 Teams Extension — build + mocha tests on every PR touching extensions/m365/**
  # Epic #129 (T061-01)
  # ---------------------------------------------------------------------------
  m365-test:
    name: M365 Teams Extension
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(toJson(github.event.pull_request.changed_files), 'extensions/m365/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extensions/m365/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/m365

      - name: Build (TypeScript compile)
        run: npm run build
        working-directory: extensions/m365

      - name: Run tests
        run: npm test
        working-directory: extensions/m365

  # ---------------------------------------------------------------------------
  # OSCAL 1.1.2 Schema Validation Gate — Epic #122 (Task #153)
  # Runs OscalValidationService unit tests + integration OSCAL export tests.
  # Fails the build if any OSCAL SSP export regresses against the bundled
  # NIST OSCAL 1.1.2 schema (oscal_ssp_schema.json).
  # ---------------------------------------------------------------------------
  oscal-schema-validation:
    name: OSCAL 1.1.2 Schema Validation
    runs-on: ubuntu-latest
    needs: [dotnet-build-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ato.Copilot.sln

      - name: Build
        run: dotnet build Ato.Copilot.sln -c Release --no-restore -nologo

      - name: Run OSCAL schema validation unit tests
        run: >
          dotnet test tests/Ato.Copilot.Tests.Unit/Ato.Copilot.Tests.Unit.csproj
          -c Release --no-build -nologo
          --filter "FullyQualifiedName~OscalValidationService|FullyQualifiedName~OscalSspExport"
          --logger trx
        env:
          OSCAL_VALIDATION_FAIL_ON_VIOLATIONS: "true"

      - name: Run OSCAL integration tests (export + schema validation)
        run: >
          dotnet test tests/Ato.Copilot.Tests.Integration/Ato.Copilot.Tests.Integration.csproj
          -c Release --no-build -nologo
          --filter "FullyQualifiedName~SspToolsIntegration|FullyQualifiedName~OscalSchemaValidation"
          --logger trx
        env:
          OSCAL_VALIDATION_FAIL_ON_VIOLATIONS: "true"

      - name: Upload OSCAL validation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oscal-validation-results
          path: |
            tests/**/TestResults/*.trx
          if-no-files-found: ignore


  ato-compliance-gate:
    name: ATO Compliance Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ATO compliance gate
        uses: ./.github/actions/ato-compliance-gate
        with:
          scan-paths: src,scripts,docs
          severity-threshold: '2'
          # Set this repository variable if you host MCP externally.
          # Defaults to localhost and still produces annotations if unreachable.
          mcp-server-url: ${{ vars.ATO_MCP_SERVER_URL || 'http://localhost:5000' }}
          fail-on-error: 'true'

  # ---------------------------------------------------------------------------
  # Dashboard production bundle audit — Epic #207 / Task #235
  # Builds the React dashboard in production mode and verifies that simulation
  # mode strings (SimulationPanel, simulate, PostSimulate) are ABSENT from the
  # output bundle. A feature flag that is merely "off" is insufficient for
  # FedRAMP; the code path must be excluded at build time.
  # ---------------------------------------------------------------------------
  dashboard-bundle-audit:
    name: Dashboard Production Bundle Audit (FedRAMP Sim-Mode Gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Ato.Copilot.Dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Ato.Copilot.Dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (NODE_ENV=production)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Audit bundle — simulation mode must be absent
        # Fail if any of the simulation-mode identifiers survive tree-shaking.
        # These strings must only exist in dev builds. Their presence in the
        # production bundle is a FedRAMP violation (Epic #207 explicit constraint).
        run: |
          echo "Scanning dist/ for simulation-mode identifiers..."
          FOUND=0
          for PATTERN in "SimulationPanel" "PostSimulate" "simulate?identityId" "SimulationMode"; do
            if grep -r --include="*.js" "$PATTERN" dist/ 2>/dev/null | grep -v "//"; then
              echo "❌ FAIL: found '$PATTERN' in production bundle — simulation code was not tree-shaken"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ PASS: no simulation-mode identifiers found in production bundle"
          else
            exit 1
          fi
