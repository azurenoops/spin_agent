name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-build-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ato.Copilot.sln

      - name: Build
        run: dotnet build Ato.Copilot.sln -c Release --no-restore -nologo

      - name: Run unit tests
        run: dotnet test tests/Ato.Copilot.Tests.Unit/Ato.Copilot.Tests.Unit.csproj -c Release --no-build -nologo --logger trx

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            tests/**/TestResults/*.trx
          if-no-files-found: ignore

  dotnet-integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: dotnet-build-test
    env:
      ASPNETCORE_ENVIRONMENT: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ato.Copilot.sln

      - name: Build
        run: dotnet build Ato.Copilot.sln -c Release --no-restore -nologo

      - name: Run integration tests
        run: |
          dotnet test tests/Ato.Copilot.Tests.Integration/Ato.Copilot.Tests.Integration.csproj \
            -c Release --no-build -nologo --logger trx \
            --filter "Category!=RequiresExternalService"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: tests/**/TestResults/*.trx
          if-no-files-found: ignore

  vscode-extension-compile:
    name: VS Code Extension Compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

  vscode-extension-test:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    needs: vscode-extension-compile

    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (mocha + vscode stub)
        run: npm test

  m365-extension-test:
    name: M365 Extension Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/m365

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/m365/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run M365 tests
        run: npm test

  dashboard-e2e-smoke:
    name: Dashboard E2E Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: src/Ato.Copilot.Dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Ato.Copilot.Dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (01-04)
        continue-on-error: true
        run: |
          npx playwright test \
            e2e/tests/01-navigation.spec.ts \
            e2e/tests/02-portfolio.spec.ts \
            e2e/tests/03-systems.spec.ts \
            e2e/tests/04-system-detail.spec.ts \
            --reporter=list
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Ato.Copilot.Dashboard/playwright-report/
          if-no-files-found: ignore

  ato-compliance-gate:
    name: ATO Compliance Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ATO compliance gate
        uses: ./.github/actions/ato-compliance-gate
        with:
          scan-paths: src,scripts,docs
          severity-threshold: '2'
          # Set this repository variable if you host MCP externally.
          # Defaults to localhost and still produces annotations if unreachable.
          mcp-server-url: ${{ vars.ATO_MCP_SERVER_URL || 'http://localhost:3001' }}
          fail-on-error: 'true'
