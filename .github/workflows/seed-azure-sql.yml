name: Seed Azure SQL Progress Data

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Resource group containing Azure SQL
        required: true
        default: rg-ato-copilot
        type: string
      sql_server_name:
        description: Azure SQL server name
        required: true
        default: azsql-ato-copilot-04152047-902
        type: string
      sql_database_name:
        description: Azure SQL database name
        required: true
        default: AtoCopilot
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable public access and ensure SP is AAD admin
        id: setup
        shell: bash
        run: |
          set -euo pipefail
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          RG="${{ github.event.inputs.resource_group }}"
          SQL_SERVER="${{ github.event.inputs.sql_server_name }}"
          RULE="Allow-GHRunner-Seed"

          # Re-enable public network access if currently disabled
          PUBLIC=$(az sql server show \
            --resource-group "$RG" --name "$SQL_SERVER" \
            --query publicNetworkAccess -o tsv 2>/dev/null || echo "Unknown")

          if [ "$PUBLIC" = "Disabled" ]; then
            echo "Public access is Disabled — enabling temporarily..."
            az sql server update \
              --resource-group "$RG" --name "$SQL_SERVER" \
              --enable-public-network true --output none
            echo "reenable_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "reenable_required=false" >> "$GITHUB_OUTPUT"
          fi

          # Ensure SP is set as AAD admin on the SQL server so it can connect
          SP_OID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          SP_NAME=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query displayName -o tsv)
          echo "SP OID: $SP_OID  Name: $SP_NAME"

          EXISTING_ADMIN=$(az sql server ad-admin show \
            --resource-group "$RG" --server "$SQL_SERVER" \
            --query login -o tsv 2>/dev/null || echo "none")
          echo "Current AAD admin: $EXISTING_ADMIN"
          echo "existing_admin=${EXISTING_ADMIN}" >> "$GITHUB_OUTPUT"

          if [ "$EXISTING_ADMIN" != "$SP_NAME" ]; then
            echo "Setting SP as AAD admin..."
            az sql server ad-admin create \
              --resource-group "$RG" --server "$SQL_SERVER" \
              --display-name "$SP_NAME" --object-id "$SP_OID" \
              --output none
            echo "sp_was_admin=false" >> "$GITHUB_OUTPUT"
          else
            echo "SP is already AAD admin."
            echo "sp_was_admin=true" >> "$GITHUB_OUTPUT"
          fi

          # Add runner IP to firewall
          echo "Adding runner IP $RUNNER_IP to SQL firewall..."
          az sql server firewall-rule create \
            --resource-group "$RG" --server "$SQL_SERVER" \
            --name "$RULE" \
            --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP" \
            --output none
          echo "Firewall rule added for $RUNNER_IP"

      - name: Install sqlcmd
        shell: bash
        run: |
          curl -fsSL https://github.com/microsoft/go-sqlcmd/releases/download/v1.8.0/sqlcmd-linux-amd64.tar.bz2 \
            | sudo tar -xj -C /usr/local/bin sqlcmd
          sqlcmd --version

      - name: Run seed-azure-progress.sql
        shell: bash
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          SQL_FQDN="${{ github.event.inputs.sql_server_name }}.database.windows.net"

          # Use service principal auth — works with AAD-only auth enabled,
          # and SP is now the AAD admin so it can connect to any database.
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            if sqlcmd \
              -S "${SQL_FQDN}" \
              --authentication-method=ActiveDirectoryServicePrincipal \
              --user "${{ secrets.AZURE_CLIENT_ID }}" \
              --password "${AZURE_CLIENT_SECRET}" \
              -d "${{ github.event.inputs.sql_database_name }}" \
              -i scripts/seed-azure-progress.sql \
              --exit-on-error; then
              echo "Seed completed successfully."
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Failed — waiting 20s before retry..."
              sleep 20
            else
              echo "All attempts failed."
              exit 1
            fi
          done

      - name: Cleanup — firewall, AAD admin, public access
        if: always()
        shell: bash
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          SQL_SERVER="${{ github.event.inputs.sql_server_name }}"

          # Remove firewall rule
          az sql server firewall-rule delete \
            --resource-group "$RG" --server "$SQL_SERVER" \
            --name "Allow-GHRunner-Seed" \
            --output none 2>/dev/null || true
          echo "Firewall rule removed."

          # Restore previous AAD admin if we replaced it
          if [ "${{ steps.setup.outputs.sp_was_admin }}" = "false" ]; then
            PREV="${{ steps.setup.outputs.existing_admin }}"
            if [ "$PREV" != "none" ] && [ -n "$PREV" ]; then
              echo "Note: previous AAD admin was '$PREV' — it has been replaced by the SP."
              echo "Restore it manually if needed via: az sql server ad-admin create ..."
            else
              echo "No previous AAD admin to restore — SP admin entry left in place."
            fi
          fi

          # Restore public network access
          if [ "${{ steps.setup.outputs.reenable_required }}" = "true" ]; then
            echo "Restoring public access to Disabled..."
            az sql server update \
              --resource-group "$RG" --name "$SQL_SERVER" \
              --enable-public-network false --output none
            echo "Public access restored to Disabled."
          fi
