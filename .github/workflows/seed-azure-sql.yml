name: Seed Azure SQL Progress Data

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Resource group containing Azure SQL
        required: true
        default: rg-ato-copilot
        type: string
      sql_server_name:
        description: Azure SQL server name
        required: true
        default: azsql-ato-copilot-04152047-902
        type: string
      sql_database_name:
        description: Azure SQL database name
        required: true
        default: AtoCopilot
        type: string
      sql_admin_login:
        description: SQL admin username
        required: true
        default: atoadmin
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable public access and whitelist runner IP
        id: firewall
        shell: bash
        run: |
          set -euo pipefail
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          RG="${{ github.event.inputs.resource_group }}"
          SQL_SERVER="${{ github.event.inputs.sql_server_name }}"
          RULE="Allow-GHRunner-Seed"

          # Re-enable public network access if currently disabled
          PUBLIC=$(az sql server show \
            --resource-group "$RG" --name "$SQL_SERVER" \
            --query publicNetworkAccess -o tsv 2>/dev/null || echo "Unknown")

          if [ "$PUBLIC" = "Disabled" ]; then
            echo "Public access is Disabled — enabling temporarily for seed..."
            az sql server update \
              --resource-group "$RG" \
              --name "$SQL_SERVER" \
              --enable-public-network true \
              --output none
            echo "reenable_required=true" >> "$GITHUB_OUTPUT"
            echo "Public access re-enabled."
          else
            echo "reenable_required=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Adding runner IP $RUNNER_IP to SQL firewall..."
          az sql server firewall-rule create \
            --resource-group "$RG" \
            --server "$SQL_SERVER" \
            --name "$RULE" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none
          echo "Firewall rule '$RULE' added for $RUNNER_IP"

      - name: Install sqlcmd
        shell: bash
        run: |
          curl -fsSL https://github.com/microsoft/go-sqlcmd/releases/download/v1.8.0/sqlcmd-linux-amd64.tar.bz2 \
            | sudo tar -xj -C /usr/local/bin sqlcmd
          sqlcmd --version

      - name: Run seed-azure-progress.sql
        shell: bash
        env:
          SQL_PASSWORD: ${{ secrets.ATO_SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          SQL_FQDN="${{ github.event.inputs.sql_server_name }}.database.windows.net"
          sqlcmd \
            -S "${SQL_FQDN}" \
            -U "${{ github.event.inputs.sql_admin_login }}" \
            -P "${SQL_PASSWORD}" \
            -d "${{ github.event.inputs.sql_database_name }}" \
            -i scripts/seed-azure-progress.sql \
            --exit-on-error

      - name: Remove firewall rule and restore public access
        if: always()
        shell: bash
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          SQL_SERVER="${{ github.event.inputs.sql_server_name }}"

          az sql server firewall-rule delete \
            --resource-group "$RG" \
            --server "$SQL_SERVER" \
            --name "Allow-GHRunner-Seed" \
            --output none 2>/dev/null || true
          echo "Firewall rule cleaned up."

          if [ "${{ steps.firewall.outputs.reenable_required }}" = "true" ]; then
            echo "Restoring public access to Disabled..."
            az sql server update \
              --resource-group "$RG" \
              --name "$SQL_SERVER" \
              --enable-public-network false \
              --output none
            echo "Public access restored to Disabled."
          fi
